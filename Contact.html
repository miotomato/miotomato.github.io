<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shengyuan Wang | Contact</title>
  <style>
    :root {
      --bg: #ece9e4;
      --fg: #111;
      --muted: #4f4f4f;
      --line: rgba(17, 17, 17, 0.16);
      --max: 980px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 28%),
        var(--bg);
    }
    a { color: inherit; text-decoration: none; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(236, 233, 228, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      max-width: 1080px;
      margin: 0 auto;
      padding: 1.4rem 1.25rem;
    }
    .brand {
      font-size: clamp(1.45rem, 2vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .nav-links {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      font-size: 1.08rem;
    }
    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 4rem 1.25rem 6rem;
    }
    h1 {
      margin: 0 0 1.25rem;
      font-size: clamp(2.5rem, 4vw, 3.8rem);
      letter-spacing: -0.05em;
    }
    p {
      margin: 0.5rem 0;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.8;
    }
    .contact-lines {
      display: grid;
      gap: 0.5rem;
      max-width: 640px;
    }
    .contact-row {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: nowrap;
    }
    .label {
      color: var(--fg);
      font-weight: 700;
      min-width: 70px;
    }
    .contact-row p {
      margin: 0;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="nav">
      <a class="brand" href="index.html">Shengyuan Wang</a>
      <div class="nav-links">
        <a href="index.html">About</a>
        <a href="Projects.html">Projects</a>
        <a href="CV.html">CV</a>
        <a href="Contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <h1>Contact</h1>
    <div class="contact-lines">
      <div class="contact-row">
        <div class="label">Email:</div>
        <p><a href="mailto:michaelwang1335@gmail.com">michaelwang1335@gmail.com</a></p>
      </div>
      <div class="contact-row">
        <div class="label">Phone:</div>
        <p><a href="tel:+19197203231">(919) 720-3231</a></p>
      </div>
    </div>
  </main>
  <footer style="max-width: 980px; margin: 0 auto; padding: 0 1.25rem 2rem; color: #666; font-size: 0.95rem; text-align: center;">&copy; 2026 Shengyuan Wang at the University of Virginia</footer>
</body>
</html>
